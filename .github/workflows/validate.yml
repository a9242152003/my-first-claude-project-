name: 標的資格自動驗證

# 每月 1 號自動跑(GitHub 伺服器有網路,能抓 yfinance)+ 可手動觸發
on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 安裝依賴
        run: pip install yfinance
      - name: 跑驗證(抓資料 + 回測 + 產表)
        run: python validate_all.py
      - name: 把最新的表 commit 回 repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add health_table.md
          if git diff --staged --quiet; then
            echo "表沒變,不 commit"
          else
            git commit -m "自動更新:標的資格驗證表 $(date +%Y-%m-%d)"
            git push
          fi
